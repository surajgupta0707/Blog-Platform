<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BlogSpace — Post</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-brand">✍️ BlogSpace</a>
      <div class="navbar-menu">
        <a href="../index.html">Home</a>
        <a href="#" onclick="goToEditor()">Write</a>
        <div class="navbar-user" id="navbarUser"></div>
      </div>
    </div>
  </nav>

  <!-- ===== POST HERO (filled by JS) ===== -->
  <div id="postHero">
    <div class="loading" style="background:#667eea;color:white;">
      <div class="loading-spinner" 
           style="border-color:rgba(255,255,255,0.3);
                  border-top-color:white;">
      </div>
      <p>Loading post...</p>
    </div>
  </div>

  <!-- ===== POST LAYOUT ===== -->
  <div class="post-layout">

    <!-- LEFT: POST CONTENT -->
    <main>
      <div id="postContent">
        <!-- filled by JS -->
      </div>
    </main>

    <!-- RIGHT: SIDEBAR -->
    <aside class="post-sidebar" id="postSidebar">
      <!-- filled by JS -->
    </aside>

  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/post.js"></script>
</body>
</html>
